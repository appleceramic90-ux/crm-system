services:
  # PostgreSQL 数据库
  - type: pserv
    name: crm-db
    plan: starter
    env: postgresql
    repo: https://github.com/appleceramic90-ux/crm-system
    branch: main

  # 后端 API 服务
  - type: web
    name: crm-backend
    plan: starter
    env: node
    repo: https://github.com/appleceramic90-ux/crm-system
    branch: main
    rootDir: backend
    buildCommand: pnpm install && pnpm prisma:generate && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
